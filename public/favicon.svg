<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark green rounded-square background -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#1b4d2e"/>
  <!-- Light grey tree silhouette: bushy crown + short trunk.
       Drawn so it reads clearly down to 16x16. -->
  <g fill="#d4d4d4">
    <!-- Crown: three overlapping circles for a bushy canopy -->
    <circle cx="16" cy="13" r="8"/>
    <circle cx="10" cy="16" r="5.5"/>
    <circle cx="22" cy="16" r="5.5"/>
    <!-- Trunk -->
    <rect x="14" y="19" width="4" height="7" rx="0.5"/>
  </g>
</svg>
